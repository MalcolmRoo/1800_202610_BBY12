<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <script type="module" src="/src/components/site-navbar.js"></script>
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link rel="stylesheet" href="/src/styles/group.css" />
  </head>

  <body class="group-page">
    <script>
      if (localStorage.getItem("darkMode") === "true")
        document.body.classList.add("dark-mode");
    </script>

    <!-- Ambient glow orbs (pure CSS decoration) -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div id="groupHeader">
      <div id="groupHeaderContent">
        <h1 id="groupTitle">Group Name</h1>
        <p id="destination-text">Destination</p>
        <p id="trip-dates"></p>
      </div>
      <div id="headerActions">
        <div id="memberCountPill">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span id="memberCountText">0 Buddies</span>
        </div>
        <button id="leaveGroup">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Leave
        </button>
      </div>
    </div>

    <div id="archivedBanner" style="display: none">
      This trip has ended. Chat is read-only.
    </div>

    <!-- Tab Switcher (replaces old bottom Chat button) -->
    <div id="tabSwitcher">
      <button id="tabBuddies" class="tab-btn active">Buddies</button>
      <button id="tabChat" class="tab-btn">Chat</button>
    </div>

    <div id="buddiesScrollable">
      <div id="buddies"></div>
    </div>

    <div id="chat">
      <div id="chatMessages"></div>
      <div id="chatInputRow">
        <div id="chatAvatarMe" class="member-avatar"></div>
        <textarea
          id="chatInput"
          placeholder="Say something…"
          rows="1"
        ></textarea>
        <button id="chatSendBtn" title="Send">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="white">
            <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- bottomButton removed — Leave is in header, Chat is tab switcher -->

    <site-navbar></site-navbar>

    <script type="module" src="/src/authentication.js"></script>
    <script type="module" src="/src/group.js"></script>
    <script type="module" src="./src/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

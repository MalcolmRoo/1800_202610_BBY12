<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../src/styles/MyAccount.css">
</head>
<body class="mainBackground">
  <script>if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark-mode');</script>

  <div class="account-header">
    <button class="account-back" onclick="history.back()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <line x1="6" y1="6" x2="18" y2="18"/>
        <line x1="18" y1="6" x2="6" y2="18"/>
      </svg>
    </button>
    <h2 class="account-title">My Account</h2>
  </div>

  <div class="profile-section">
    <div class="profile-pic" id="profilePicContainer">
      <span>👤</span>
      <button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
          <path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
        </svg>
      </button>
    </div>
    <input type="file" id="picInput" accept="image/*" hidden>
    <p class="profile-name">Username</p>
    <p class="profile-email">user@email.com</p>
  </div>

  <script>
    // ── Show profile picture INSTANTLY from localStorage ──
    (function () {
      var picEl = document.getElementById("profilePicContainer");
      var savedPic = localStorage.getItem("profilePic");
      var camSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>';
      var cam = '<button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">' + camSvg + '</button>';
      if (savedPic) {
        picEl.innerHTML = '<img src="' + savedPic + '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />' + cam;
      }
      // Attach camera click immediately
      document.getElementById("changePicBtn").addEventListener("click", function (e) {
        e.stopPropagation();
        document.getElementById("picInput").click();
      });
    })();
  </script>

  <div class="account-item">
    <span>👤 Edit Profile</span>
    <span class="account-arrow">›</span>
  </div>
  <div class="account-item">
    <span>🔒 Change Password</span>
    <span class="account-arrow">›</span>
  </div>
  <div class="account-item">
    <span>📧 Change Email</span>
    <span class="account-arrow">›</span>
  </div>
  <div class="account-item" id="deleteAccountBtn">
    <span>🗑️ Delete Account</span>
    <span class="account-arrow">›</span>
  </div>

  <!-- Delete Account Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-card">
      <p class="modal-text">Are you sure you want to delete your account?</p>
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-no" id="deleteNo">No</button>
        <button class="modal-btn modal-btn-yes" id="deleteYes">Yes</button>
      </div>
    </div>
  </div>

  <script>
    // ── Delete Account UI logic ──
    (function () {
      var deleteBtn = document.getElementById("deleteAccountBtn");
      var modal = document.getElementById("deleteModal");
      var noBtn = document.getElementById("deleteNo");
      var yesBtn = document.getElementById("deleteYes");

      deleteBtn.addEventListener("click", function () {
        modal.classList.add("show");
      });

      noBtn.addEventListener("click", function () {
        modal.classList.remove("show");
      });

      // Close modal when clicking the backdrop
      modal.addEventListener("click", function (e) {
        if (e.target === modal) {
          modal.classList.remove("show");
        }
      });
    })();
  </script>
  <script>
    // ── Profile picture camera button ──
    (function () {
      var changeBtn = document.getElementById("changePicBtn");
      var picInput = document.getElementById("picInput");

      function compressImage(dataUrl, maxSize, quality, callback) {
        var img = new Image();
        img.onload = function () {
          var canvas = document.createElement("canvas");
          var w = img.width;
          var h = img.height;
          // Crop to square (center)
          var side = Math.min(w, h);
          var sx = (w - side) / 2;
          var sy = (h - side) / 2;
          canvas.width = maxSize;
          canvas.height = maxSize;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, sx, sy, side, side, 0, 0, maxSize, maxSize);
          callback(canvas.toDataURL("image/jpeg", quality));
        };
        img.src = dataUrl;
      }

      function updatePic(dataUrl) {
        var picEl = document.getElementById("profilePicContainer");
        var cameraSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="white">'
          + '<path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>'
          + '</svg>';
        picEl.innerHTML = '<img src="' + dataUrl + '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />'
          + '<button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">'
          + cameraSvg
          + '</button>';
        // Re-attach click handler to the new button
        var newBtn = document.getElementById("changePicBtn");
        newBtn.addEventListener("click", function (ev) {
          ev.stopPropagation();
          picInput.click();
        });
      }

      changeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        picInput.click();
      });

      picInput.addEventListener("change", function (e) {
        var file = e.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function (event) {
          // Show raw image immediately for fast preview
          updatePic(event.target.result);
          // Compress in background, then save the smaller version
          compressImage(event.target.result, 200, 0.8, function (compressed) {
            console.log("[Profile] Compressed image:", compressed.length, "chars");
            localStorage.setItem("profilePic", compressed);
            updatePic(compressed);
            console.log("[Profile] Dispatching profilePicChanged event");
            window.dispatchEvent(new CustomEvent("profilePicChanged", { detail: compressed }));
          });
        };
        reader.readAsDataURL(file);
      });
    })();
  </script>
  <script type="module">
    // ── Load real user profile from Firestore ──
    try {
      const { db, auth } = await import("/src/firebaseConfig.js");
      const { doc, getDoc, setDoc } = await import("firebase/firestore");
      const { onAuthStateChanged } = await import("firebase/auth");

      onAuthStateChanged(auth, async function (user) {
        if (!user) return;

        try {
          console.log("[Profile] Fetching Firestore doc for:", user.uid);
          var userDoc = await getDoc(doc(db, "tbUsers", user.uid));
          console.log("[Profile] Doc exists:", userDoc.exists());
          if (userDoc.exists()) {
            var data = userDoc.data();
            console.log("[Profile] Firestore data:", JSON.stringify(data));
            console.log("[Profile] profilePicture field:", data.profilePicture);

            // Update name and email from Firestore
            var nameEl = document.querySelector(".profile-name");
            var emailEl = document.querySelector(".profile-email");
            if (nameEl) nameEl.textContent = data.name || user.displayName || "Unknown";
            if (emailEl) emailEl.textContent = data.email || user.email || "";

            // Only update picture if localStorage doesn't have one yet
            var savedPic = localStorage.getItem("profilePic");
            console.log("[Profile] localStorage profilePic:", savedPic ? "YES (" + savedPic.length + " chars)" : "NO");
            if (!savedPic && data.profilePicture && data.profilePicture !== "/images/account.png") {
              var picEl = document.querySelector(".profile-pic");
              var camSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>';
              var cam = '<button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">' + camSvg + '</button>';
              picEl.innerHTML = '<img src="' + data.profilePicture + '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />' + cam;
              document.getElementById("changePicBtn").addEventListener("click", function (ev) {
                ev.stopPropagation();
                document.getElementById("picInput").click();
              });
            } else if (!savedPic) {
              // Show initials if no picture anywhere
              var picEl2 = document.querySelector(".profile-pic");
              var camSvg2 = '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>';
              var cam2 = '<button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">' + camSvg2 + '</button>';
              var initials = (data.name || user.displayName || "U").charAt(0).toUpperCase();
              picEl2.innerHTML = '<span style="font-size:42px;font-weight:800;color:#c5ace5;">' + initials + '</span>' + cam2;
              document.getElementById("changePicBtn").addEventListener("click", function (ev) {
                ev.stopPropagation();
                document.getElementById("picInput").click();
              });
            }
          } else {
            // Fallback: use Firebase Auth profile data when Firestore doc is missing
            var nameEl = document.querySelector(".profile-name");
            var emailEl = document.querySelector(".profile-email");
            if (nameEl) nameEl.textContent = user.displayName || "Unknown";
            if (emailEl) emailEl.textContent = user.email || "";
          }
        } catch (err) {
          console.error("Error loading profile:", err);
        }

        // Save profile picture to Firestore when changed
        console.log("[Profile] Attaching profilePicChanged listener for:", user.uid);
        window.addEventListener("profilePicChanged", function (e) {
          console.log("[Profile] profilePicChanged event received, saving to Firestore...");
          setDoc(doc(db, "tbUsers", user.uid), {
            profilePicture: e.detail
          }, { merge: true }).then(function () {
            console.log("[Profile] Firestore save SUCCESS");
          }).catch(function (err) {
            console.error("[Profile] Firestore save FAILED:", err);
          });
        });
      });
    } catch (err) {
      console.error("Profile module load error:", err);
    }
  </script>

  <script type="module">
    // ── Delete Account — Firebase logic ──
    try {
      const { db, auth } = await import("/src/firebaseConfig.js");
      const { doc, deleteDoc } = await import("firebase/firestore");
      const { deleteUser } = await import("firebase/auth");

      var yesBtn = document.getElementById("deleteYes");
      var modal = document.getElementById("deleteModal");

      yesBtn.addEventListener("click", async function () {
        var user = auth.currentUser;
        if (!user) {
          alert("No user is logged in.");
          return;
        }

        yesBtn.disabled = true;
        yesBtn.textContent = "Deleting...";

        try {
          // 1. Delete Firestore user document
          await deleteDoc(doc(db, "tbUsers", user.uid));

          // 2. Delete Firebase Auth account
          await deleteUser(user);

          // 3. Clear local data and redirect
          localStorage.clear();
          window.location.href = "/index.html";
        } catch (err) {
          console.error("Delete account error:", err);
          modal.classList.remove("show");
          yesBtn.disabled = false;
          yesBtn.textContent = "Yes";

          if (err.code === "auth/requires-recent-login") {
            alert("For security, please log out and log back in before deleting your account.");
          } else {
            alert("Failed to delete account. Please try again.");
          }
        }
      });
    } catch (err) {
      console.error("Delete account module load error:", err);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../src/components/site-navbar.js"></script>

</body>
</html>

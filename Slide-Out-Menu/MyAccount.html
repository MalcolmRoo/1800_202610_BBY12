<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../src/styles/MyAccount.css">
</head>
<body class="mainBackground">
  <script>if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark-mode');</script>

  <div class="account-header">
    <button class="account-back" onclick="history.back()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <line x1="6" y1="6" x2="18" y2="18"/>
        <line x1="18" y1="6" x2="6" y2="18"/>
      </svg>
    </button>
    <h2 class="account-title">My Account</h2>
  </div>

  <div class="profile-section">
    <div class="profile-pic">
      <span>👤</span>
    </div>
    <p class="profile-name">Username</p>
    <p class="profile-email">user@email.com</p>
  </div>

  <div class="account-item">
    <span>👤 Edit Profile</span>
    <span class="account-arrow">›</span>
  </div>
  <div class="account-item">
    <span>🔒 Change Password</span>
    <span class="account-arrow">›</span>
  </div>
  <div class="account-item">
    <span>📧 Change Email</span>
    <span class="account-arrow">›</span>
  </div>
  <div class="account-item">
    <span>🗑️ Delete Account</span>
    <span class="account-arrow">›</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../src/components/site-navbar.js"></script>

</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You Found It!</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Sans", sans-serif;
        overflow: hidden;
        background: #0f0a1a;
      }

      /* Animated gradient background */
      .bg {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #1a0a2e, #0f0a1a, #1a1225, #0d0820);
        background-size: 400% 400%;
        animation: gradientShift 8s ease infinite;
        z-index: 0;
      }

      @keyframes gradientShift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Floating particles */
      .particles {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }
      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(197, 172, 229, 0.4);
        border-radius: 50%;
        animation: float linear infinite;
      }
      .particle:nth-child(1)  { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 3px; height: 3px; }
      .particle:nth-child(2)  { left: 25%; animation-duration: 15s; animation-delay: 2s; }
      .particle:nth-child(3)  { left: 40%; animation-duration: 10s; animation-delay: 4s; width: 5px; height: 5px; }
      .particle:nth-child(4)  { left: 55%; animation-duration: 14s; animation-delay: 1s; }
      .particle:nth-child(5)  { left: 70%; animation-duration: 11s; animation-delay: 3s; width: 3px; height: 3px; }
      .particle:nth-child(6)  { left: 85%; animation-duration: 13s; animation-delay: 5s; }
      .particle:nth-child(7)  { left: 15%; animation-duration: 16s; animation-delay: 6s; width: 5px; height: 5px; }
      .particle:nth-child(8)  { left: 60%; animation-duration: 9s;  animation-delay: 2s; }
      .particle:nth-child(9)  { left: 35%; animation-duration: 17s; animation-delay: 4s; width: 3px; height: 3px; }
      .particle:nth-child(10) { left: 80%; animation-duration: 12s; animation-delay: 1s; }

      @keyframes float {
        0%   { transform: translateY(110vh) scale(0); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
      }

      /* Card */
      .credits-card {
        position: relative;
        z-index: 10;
        background: rgba(26, 18, 40, 0.85);
        backdrop-filter: blur(20px);
        border: 1.5px solid rgba(197, 172, 229, 0.2);
        border-radius: 28px;
        padding: 48px 36px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 0 60px rgba(123, 94, 160, 0.15),
          0 0 120px rgba(123, 94, 160, 0.05);
        animation: cardIn 0.8s ease-out;
      }

      @keyframes cardIn {
        0%   { transform: scale(0.8) translateY(40px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }

      .secret-emoji {
        font-size: 56px;
        margin-bottom: 16px;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.15); }
      }

      .credits-card h1 {
        font-family: "Syne", sans-serif;
        font-size: 1.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, #c5ace5, #9b7fc7, #c5ace5);
        background-size: 200% 200%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s ease infinite;
        margin-bottom: 6px;
      }

      @keyframes shimmer {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      .subtitle {
        font-size: 14px;
        color: #a890cc;
        margin-bottom: 28px;
      }

      .divider {
        border: none;
        border-top: 1px solid rgba(197, 172, 229, 0.15);
        margin: 0 0 24px;
      }

      /* Team members */
      .team-list {
        list-style: none;
        padding: 0;
        margin: 0 0 28px;
      }
      .team-list li {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: #e0d4f5;
        padding: 10px 0;
        border-bottom: 1px solid rgba(197, 172, 229, 0.08);
        opacity: 0;
        animation: fadeUp 0.5s ease forwards;
      }
      .team-list li:last-child { border-bottom: none; }
      .team-list li:nth-child(1) { animation-delay: 0.3s; }
      .team-list li:nth-child(2) { animation-delay: 0.45s; }
      .team-list li:nth-child(3) { animation-delay: 0.6s; }
      .team-list li:nth-child(4) { animation-delay: 0.75s; }

      @keyframes fadeUp {
        0%   { transform: translateY(12px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }

      .tag {
        display: inline-block;
        font-family: "DM Sans", sans-serif;
        font-size: 10px;
        font-weight: 600;
        color: #a890cc;
        background: rgba(197, 172, 229, 0.1);
        border-radius: 999px;
        padding: 3px 10px;
        margin-left: 8px;
        vertical-align: middle;
      }

      .footer-text {
        font-size: 13px;
        color: #6b4d9a;
        line-height: 1.5;
        margin-bottom: 24px;
      }

      .back-btn {
        background: rgba(197, 172, 229, 0.12);
        border: 1.5px solid rgba(197, 172, 229, 0.25);
        border-radius: 14px;
        color: #c5ace5;
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 700;
        padding: 12px 36px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .back-btn:hover {
        background: rgba(197, 172, 229, 0.2);
        border-color: rgba(197, 172, 229, 0.4);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="credits-card">
      <div class="secret-emoji">🥚</div>
      <h1>You Found It!</h1>
      <p class="subtitle">Travel Buddies &mdash; COMP 1800 &mdash; BCIT</p>
      <hr class="divider" />
      <ul class="team-list">
        <li>Omar Issa</li>
        <li>Shaan Puar</li>
        <li>Malcolm Roosdahl</li>
        <li>Veerpartnap Kahlon</li>
      </ul>
      <p class="footer-text">You tapped the logo 5 times. Most people never find this page. You're not most people.</p>
      <button class="back-btn" onclick="window.location.href='index.html'">Back to App</button>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <title>Login — Travel Buddies</title>
    <meta name="travelbuddiesLogin" content="Travel Buddies — Login" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/login.css" />
  </head>

  <body>
    <script>
      // Quick localStorage load for immediate UI
      (function() {
        if (localStorage.getItem('darkMode') === 'true') {
          document.body.classList.add('dark-mode');
        }
      })();
    </script>

    <div class="bg"></div>

    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="auth-card">
      <!-- Alerts -->
      <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>

      <!-- Login -->
      <div id="loginView">
        <h3 class="mb-4 text-center">Welcome Back</h3>
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <input
              type="email"
              id="loginEmail"
              class="form-control"
              placeholder="Email"
              required
            />
          </div>
          <div class="mb-3">
            <input
              type="password"
              id="loginPassword"
              class="form-control"
              placeholder="Password"
              required
            />
          </div>
          <button type="submit" class="btn-submit w-100">
            Login
          </button>
        </form>
        <p class="d-block mt-3 text-center auth-subtitle">
          Don't have an account?
          <a href="#" class="toggle-link" id="toSignup">Sign up</a>
        </p>
      </div>

      <!-- Signup -->
      <div id="signupView" class="d-none">
        <h3 class="mb-4 text-center">Create Account</h3>
        <form id="signupForm" novalidate>
          <div class="mb-3">
            <input
              type="text"
              id="signupName"
              class="form-control"
              placeholder="First and Last Name"
              aria-label="Full name"
              required
            />
          </div>
          <div class="mb-3">
            <input
              type="email"
              id="signupEmail"
              class="form-control"
              placeholder="Email"
              required
            />
          </div>
          <div class="mb-3">
            <input
              type="password"
              id="signupPassword"
              class="form-control"
              placeholder="Password"
              required
            />
          </div>
          <button type="submit" class="btn-submit w-100">
            Create Account
          </button>
        </form>
        <p class="d-block mt-3 text-center auth-subtitle">
          Already have an account?
          <a href="#" class="toggle-link" id="toLogin">Login</a>
        </p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/loginSignup.js"></script>
    <script type="module">
      import { initDarkMode } from '/src/darkMode.js';
      initDarkMode();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

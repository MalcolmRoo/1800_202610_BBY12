  <body class="createButtonBody">
    <div class="wrapper">
      <header id="cbHeader">
        <h1 id="cbH1">Create your<br /><span>Buddy Group</span></h1>
      </header>
      <form class="card" id="createGroupForm">
        <!-- Group Name -->
        <div class="field">
          <label for="group-name" id="cbLable">Group Name</label>
          <input
            name="group-name"
            type="text"
            id="group-name"
            placeholder="e.g. Summer Squad"
            required
          />
        </div>

        <hr class="divider" />

        <!-- Destinations -->
        <div class="field">
          <label id="cbLable">Destinations</label>
          <div class="destinations-list" id="destinations-list">
            <input
              name="destinations-list"
              type="text"
              placeholder="Search a city or address…"
              autocomplete="off"
              required
            />
          </div>
          <!--oninput="showSuggestions(this)"-->
        </div>

        <hr class="divider" />

        <label for="range4" class="form-label">Max Group size</label>
        <input
          name="maxBuddies"
          type="range"
          class="form-range"
          min="2"
          max="12"
          value="2"
          id="range4"
        />
        <output for="range4" id="rangeValue" aria-hidden="true"></output>

        <script>
          // This is an example script, please modify as needed
          const rangeInput = document.getElementById("range4");
          const rangeOutput = document.getElementById("rangeValue");

          // Set initial value
          rangeOutput.textContent = rangeInput.value;

          rangeInput.addEventListener("input", function () {
            rangeOutput.textContent = this.value;
          });
        </script>
        <hr class="divider" />

        <!-- Tags -->
        <div class="field">
          <label id="cbLable">Trip Vibe (pick all that apply)</label>
          <div class="tags-grid">
            <input
              type="checkbox"
              class="tag-option"
              id="tag-Chatty"
              name="tags[]"
              value="Chatty"
            />
            <label id="cbLable" class="tag-label" for="tag-Chatty"
              >Chatty</label
            >

            <input
              type="checkbox"
              class="tag-option"
              id="tag-Quiet"
              name="tags[]"
              value="Quiet"
            />
            <label id="cbLable" class="tag-label" for="tag-Quiet">Quiet</label>

            <input
              type="checkbox"
              class="tag-option"
              id="tag-FamilyOriented"
              name="tags[]"
              value="familyOriented"
            />
            <label id="cbLable" class="tag-label" for="tag-FamilyOriented"
              >Family Oriented</label
            >

            <input
              type="checkbox"
              class="tag-option"
              id="tag-PhysicalImpariment"
              name="tags[]"
              value="PhysicalImpairment"
            />
            <label id="cbLable" class="tag-label" for="tag-PhysicalImpariment"
              >Physical Impairments</label
            >

            <input
              type="checkbox"
              class="tag-option"
              id="tag-Culture"
              name="tags[]"
              value="culture"
            />
            <label id="cbLable" class="tag-label" for="tag-Culture"
              >Culture</label
            >

            <input
              type="checkbox"
              class="tag-option"
              id="tag-MentalImpairment"
              name="tags[]"
              value="Mental Impairment"
            />
            <label id="cbLable" class="tag-label" for="tag-MentalImpairment"
              >Mental Impairments</label
            >
          </div>
        </div>

        <hr class="divider" />

        <!-- Travel Method -->
        <div class="field">
          <label id="cbLable">Travel Method</label>
          <div class="travel-grid">
            <input
              type="radio"
              class="travel-radio"
              id="travel-drive"
              name="travel-method"
              value="drive"
            />
            <label id="cbLable" class="travel-card" for="travel-drive">
              <span class="icon">🚗</span> Drive
            </label>

            <input
              type="radio"
              class="travel-radio"
              id="travel-train"
              name="travel-method"
              value="skyTrain"
            />
            <label id="cbLable" class="travel-card" for="travel-train">
              <span class="icon">🚆</span> skyTrain
            </label>

            <input
              type="radio"
              class="travel-radio"
              id="travel-bus"
              name="travel-method"
              value="bus"
            />
            <label id="cbLable" class="travel-card" for="travel-bus">
              <span class="icon">🚌</span> Bus
            </label>

            <input
              type="radio"
              class="travel-radio"
              id="travel-boat"
              name="travel-method"
              value="boat"
            />
            <label id="cbLable" class="travel-card" for="travel-boat">
              <span class="icon">🚢</span> Boat
            </label>

            <input
              type="radio"
              class="travel-radio"
              id="travel-mix"
              name="travel-method"
              value="mix"
            />
            <label id="cbLable" class="travel-card" for="travel-mix">
              <span class="icon">🗺️</span> Mixed
            </label>
          </div>
        </div>

        <hr class="divider" />

        <!-- Visibility -->
        <div class="field">
          <label id="cbLable">Who can join?</label>
          <div class="visibility-row">
            <input
              type="radio"
              class="vis-radio"
              id="vis-open"
              name="visibility"
              value="open"
              checked
            />
            <label id="cbLable" class="vis-label" for="vis-open">
              🌍 <span>Open — Anyone can join</span>
            </label>

            <input
              type="radio"
              class="vis-radio"
              id="vis-private"
              name="visibility"
              value="private"
            />
            <label id="cbLable" class="vis-label" for="vis-private">
              🔒 <span>Private — Invite only</span>
            </label>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn">Create Trip →</button>
      </form>
    </div>
    <nav>
      <site-navbar></site-navbar>
    </nav>
    <script type="module" src="./src/main.js"></script>

    <script type="module" src="./src/createGroup.js"></script>
  </body>

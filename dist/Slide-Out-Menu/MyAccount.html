      rel="stylesheet"
    />
    <script type="module" crossorigin src="/assets/MyAccount-DeFuxzFi.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/assets/site-navbar-BH1o0s9n.js">

  <body class="mainBackground">
    <script>
      // applies the dark-mode when its toggle is on!
      if (localStorage.getItem("darkMode") === "true")
        document.body.classList.add("dark-mode");
    </script>

    <div class="account-header">
      <button class="account-back" onclick="history.back()">
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="6" y1="6" x2="18" y2="18" />
          <line x1="18" y1="6" x2="6" y2="18" />
        </svg>
      </button>
      <h2 class="account-title">My Account</h2>
    </div>

    <div class="profile-section">
      <div class="profile-pic" id="profilePicContainer">
        <span>👤</span>
        <button
          class="profile-pic-overlay"
          id="changePicBtn"
          title="Change profile picture"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
            <path
              d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"
            />
          </svg>
        </button>
      </div>
      <input type="file" id="picInput" accept="image/*" hidden />
      <p class="profile-name" id="profileName"></p>
      <p class="profile-status" id="profileStatus"></p>
      <p class="profile-email" id="profileEmail"></p>
    </div>

    <script>
      // ── Instant load from localStorage ──
      (function () {
        var camSvg =
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>';
        var camBtn =
          '<button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">' +
          camSvg +
          "</button>";

        // Profile picture
        var savedPic = localStorage.getItem("profilePic");
        if (savedPic) {
          document.getElementById("profilePicContainer").innerHTML =
            '<img src="' +
            savedPic +
            '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />' +
            camBtn;
        }
        document
          .getElementById("changePicBtn")
          .addEventListener("click", function (e) {
            e.stopPropagation();
            document.getElementById("picInput").click();
          });

        // Name and email
        document.getElementById("profileName").textContent =
          localStorage.getItem("userName") || "Username";
        document.getElementById("profileStatus").textContent =
          localStorage.getItem("userStatus") || "No status set";
        document.getElementById("profileEmail").textContent =
          localStorage.getItem("userEmail") || "user@email.com";
      })();
    </script>

    <div class="account-item" id="editProfileBtn">
      <span>👤 Edit Profile</span>
      <span class="account-arrow">›</span>
    </div>
    <div class="account-dropdown" id="editProfileDropdown">

          <input type="text" id="editDisplayNameInput" class="form-control" placeholder="Enter display name" />

        <div class="form-group">

    <div class="account-item" id="changePasswordBtn">
      <span>🔒 Change Password</span>
      <span class="account-arrow">›</span>

    <div class="account-dropdown" id="changePasswordDropdown">
      <div class="dropdown-content">
        <div class="form-group">
          <label for="currentPasswordInput">CURRENT PASSWORD</label>
          <input type="password" id="currentPasswordInput" class="form-control" placeholder="Enter current password" />
          <span class="error-message" id="currentPasswordError"></span>

        <div class="form-group">
          <label for="newPasswordInput">NEW PASSWORD</label>
          <input type="password" id="newPasswordInput" class="form-control" placeholder="Enter new password" />
          <span class="error-message" id="newPasswordError"></span>

        <div class="form-group">
          <label for="confirmPasswordInput">CONFIRM PASSWORD</label>
          <input type="password" id="confirmPasswordInput" class="form-control" placeholder="Confirm new password" />
          <span class="error-message" id="confirmPasswordError"></span>
        </div>
        <div class="dropdown-buttons">
          <button class="dropdown-btn dropdown-btn-cancel" id="passwordCancelBtn">Cancel</button>
          <button class="dropdown-btn dropdown-btn-save" id="passwordSaveBtn">Update Password</button>

    <div class="account-item" id="changeEmailBtn">
      <span>📧 Change Email</span>
      <span class="account-arrow">›</span>
    </div>
    <div class="account-dropdown" id="changeEmailDropdown">
      <div class="dropdown-content">
        <div class="form-group">
          <label for="currentEmailPasswordInput">CURRENT PASSWORD</label>
          <input type="password" id="currentEmailPasswordInput" class="form-control" placeholder="Enter current password" />

    <div class="account-item" id="deleteAccountBtn">
      <span>🗑️ Delete Account</span>
      <span class="account-arrow">›</span>
    </div>
    <div class="account-dropdown" id="deleteAccountDropdown">
      <div class="dropdown-content">
        <p class="delete-warning">Are you sure you want to delete your account? This action cannot be undone.</p>
        <div class="form-group">
          <label for="deletePasswordInput">ENTER PASSWORD TO CONFIRM</label>
          <input type="password" id="deletePasswordInput" class="form-control" placeholder="Enter your password" />
          <span class="error-message" id="deletePasswordError"></span>
        </div>
        <div class="dropdown-buttons">
          <button class="dropdown-btn dropdown-btn-cancel" id="deleteCancelBtn">Cancel</button>
          <button class="dropdown-btn dropdown-btn-danger" id="deleteConfirmBtn">Delete Account</button>
        </div>
      </div>
    </div>

    <!-- Success Toast -->
    <div class="toast" id="successToast">
      <span class="toast-icon">✓</span>
      <span class="toast-message">Profile updated successfully!</span>
    </div>

    <script>
      // ── Delete Account Dropdown logic ──
      (function () {
        var deleteBtn = document.getElementById("deleteAccountBtn");
        var deleteDropdown = document.getElementById("deleteAccountDropdown");
        var deleteArrow = deleteBtn.querySelector('.account-arrow');
        var deletePasswordInput = document.getElementById("deletePasswordInput");
        var deletePasswordError = document.getElementById("deletePasswordError");
        var deleteCancelBtn = document.getElementById("deleteCancelBtn");
        var deleteConfirmBtn = document.getElementById("deleteConfirmBtn");

        function closeDropdown() {
          deleteDropdown.classList.remove("show");
          deleteArrow.classList.remove("rotated");
          deletePasswordError.textContent = "";
          deletePasswordInput.classList.remove("input-error");
          deletePasswordInput.value = "";
        }

        deleteBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          if (deleteDropdown.classList.contains("show")) {
            closeDropdown();
          } else {
            deleteDropdown.classList.add("show");
            deleteArrow.classList.add("rotated");
          }
        });

        deleteCancelBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          closeDropdown();
        });

        document.addEventListener("click", function (e) {
          if (!deleteDropdown.contains(e.target) && !deleteBtn.contains(e.target)) {
            if (deleteDropdown.classList.contains("show")) {
              closeDropdown();
            }
          }
        });

        deleteConfirmBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          deletePasswordError.textContent = "";
          deletePasswordInput.classList.remove("input-error");
          
          var password = deletePasswordInput.value;
          if (!password) {
            deletePasswordError.textContent = "Password is required to delete account";
            deletePasswordInput.classList.add("input-error");
            return;
          }

          deleteConfirmBtn.disabled = true;
          deleteConfirmBtn.textContent = "Deleting...";

          setTimeout(function() {
            deleteConfirmBtn.disabled = false;
            deleteConfirmBtn.textContent = "Delete Account";
            alert("Account deletion is simulated for demo.");
            closeDropdown();
          }, 500);
        });
      })();
    </script>
    <script>
      // ── Edit Profile Dropdown logic ──
      (function () {
        var editBtn = document.getElementById("editProfileBtn");
        var dropdown = document.getElementById("editProfileDropdown");
        var arrow = editBtn.querySelector('.account-arrow');
        var statusInput = document.getElementById("editUsernameInput");
        var displayNameInput = document.getElementById("editDisplayNameInput");
        var statusError = document.getElementById("usernameError");
        var displayNameError = document.getElementById("displayNameError");
        var cancelBtn = document.getElementById("editCancelBtn");
        var saveBtn = document.getElementById("editSaveBtn");
        var toast = document.getElementById("successToast");
        var unsavedModal = document.getElementById("unsavedChangesModal");
        var unsavedNo = document.getElementById("unsavedNo");
        var unsavedYes = document.getElementById("unsavedYes");

        var originalStatus = "";
        var originalDisplayName = "";
        var hasUnsavedChanges = false;
        var pendingClose = false;

        function getOriginalValues() {
          originalStatus = localStorage.getItem("userStatus") || "";
          originalDisplayName = document.getElementById("profileName").textContent || localStorage.getItem("userName") || "";
        }

        function checkForChanges() {
          var currentStatus = statusInput.value.trim();
          var currentDisplayName = displayNameInput.value.trim();
          hasUnsavedChanges = (currentStatus !== originalStatus || currentDisplayName !== originalDisplayName);
        }

        function clearErrors() {
          statusError.textContent = "";
          displayNameError.textContent = "";
          statusInput.classList.remove("input-error");
          displayNameInput.classList.remove("input-error");
        }

        function closeDropdown(discard) {
          if (discard || !hasUnsavedChanges) {
            dropdown.classList.remove("show");
            arrow.classList.remove("rotated");
            clearErrors();
            hasUnsavedChanges = false;
          } else {
            pendingClose = true;
            unsavedModal.classList.add("show");
          }
        }

        function openDropdown() {
          getOriginalValues();
          statusInput.value = originalStatus;
          displayNameInput.value = originalDisplayName;
          clearErrors();
          hasUnsavedChanges = false;
          dropdown.classList.add("show");
          arrow.classList.add("rotated");
        }

        function showSuccess() {
          toast.classList.add("show");
          setTimeout(function() {
            toast.classList.remove("show");
          }, 3000);
        }

        function refreshDisplay() {
          var newDisplayName = displayNameInput.value.trim();
          if (newDisplayName) {
            document.getElementById("profileName").textContent = newDisplayName;
            localStorage.setItem("userName", newDisplayName);
          }
          var newStatus = statusInput.value.trim();
          if (newStatus) {
            document.getElementById("profileStatus").textContent = newStatus;
            localStorage.setItem("userStatus", newStatus);
          }
          window.dispatchEvent(new CustomEvent("profileUpdated", { 
            detail: { name: newDisplayName, status: newStatus } 
          }));
          getOriginalValues();
          hasUnsavedChanges = false;
        }

        editBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          if (dropdown.classList.contains("show")) {
            closeDropdown(false);
          } else {
            openDropdown();
          }
        });

        cancelBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          closeDropdown(false);
        });

        statusInput.addEventListener("input", checkForChanges);
        displayNameInput.addEventListener("input", checkForChanges);

        document.addEventListener("click", function (e) {
          if (!dropdown.contains(e.target) && !editBtn.contains(e.target)) {
            if (dropdown.classList.contains("show")) {
              closeDropdown(false);
            }
          }
        });

        unsavedNo.addEventListener("click", function (e) {
          e.stopPropagation();
          unsavedModal.classList.remove("show");
          pendingClose = false;
        });

        unsavedYes.addEventListener("click", function (e) {
          e.stopPropagation();
          unsavedModal.classList.remove("show");
          if (pendingClose) {
            dropdown.classList.remove("show");
            arrow.classList.remove("rotated");
            clearErrors();
            hasUnsavedChanges = false;
            pendingClose = false;
          }
        });

        unsavedModal.addEventListener("click", function (e) {
          if (e.target === unsavedModal) {
            unsavedModal.classList.remove("show");
            pendingClose = false;
          }
        });

        saveBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          clearErrors();
          var status = statusInput.value.trim();
          var displayName = displayNameInput.value.trim();
          var isValid = true;

          if (!status) {
            statusError.textContent = "Status is required";
            statusInput.classList.add("input-error");
            isValid = false;
          }

          if (!displayName) {
            displayNameError.textContent = "Display name is required";
            displayNameInput.classList.add("input-error");
            isValid = false;
          }

          if (!isValid) return;

          saveBtn.disabled = true;
          saveBtn.textContent = "Saving...";

          setTimeout(function() {
            refreshDisplay();
            dropdown.classList.remove("show");
            arrow.classList.remove("rotated");
            saveBtn.disabled = false;
            saveBtn.textContent = "Save Changes";
            showSuccess();
          }, 500);
        });
      })();
    </script>
    <script>
      // ── Change Password Dropdown logic ──
      (function () {
        var passwordBtn = document.getElementById("changePasswordBtn");
        var passwordDropdown = document.getElementById("changePasswordDropdown");
        var passwordArrow = passwordBtn.querySelector('.account-arrow');
        var currentPasswordInput = document.getElementById("currentPasswordInput");
        var newPasswordInput = document.getElementById("newPasswordInput");
        var confirmPasswordInput = document.getElementById("confirmPasswordInput");
        var currentPasswordError = document.getElementById("currentPasswordError");
        var newPasswordError = document.getElementById("newPasswordError");
        var confirmPasswordError = document.getElementById("confirmPasswordError");
        var passwordCancelBtn = document.getElementById("passwordCancelBtn");
        var passwordSaveBtn = document.getElementById("passwordSaveBtn");
        var toast = document.getElementById("successToast");

        var hasUnsavedChanges = false;

        function checkForChanges() {
          hasUnsavedChanges = (currentPasswordInput.value || newPasswordInput.value || confirmPasswordInput.value);
        }

        function clearErrors() {
          currentPasswordError.textContent = "";
          newPasswordError.textContent = "";
          confirmPasswordError.textContent = "";
          currentPasswordInput.classList.remove("input-error");
          newPasswordInput.classList.remove("input-error");
          confirmPasswordInput.classList.remove("input-error");
        }

        function closeDropdown() {
          passwordDropdown.classList.remove("show");
          passwordArrow.classList.remove("rotated");
          clearErrors();
          currentPasswordInput.value = "";
          newPasswordInput.value = "";
          confirmPasswordInput.value = "";
          hasUnsavedChanges = false;
        }

        function showSuccess() {
          toast.classList.add("show");
          setTimeout(function() {
            toast.classList.remove("show");
          }, 3000);
        }

        function showPasswordError(msg) {
          toast.querySelector('.toast-message').textContent = msg;
          toast.classList.add("show");
          setTimeout(function() {
            toast.classList.remove("show");
            toast.querySelector('.toast-message').textContent = "Profile updated successfully!";
          }, 3000);
        }

        passwordBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          if (passwordDropdown.classList.contains("show")) {
            closeDropdown();
          } else {
            passwordDropdown.classList.add("show");
            passwordArrow.classList.add("rotated");
          }
        });

        passwordCancelBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          closeDropdown();
        });

        [currentPasswordInput, newPasswordInput, confirmPasswordInput].forEach(function(input) {
          input.addEventListener("input", checkForChanges);
        });

        document.addEventListener("click", function (e) {
          if (!passwordDropdown.contains(e.target) && !passwordBtn.contains(e.target)) {
            if (passwordDropdown.classList.contains("show")) {
              closeDropdown();
            }
          }
        });

        passwordSaveBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          clearErrors();
          var currentPwd = currentPasswordInput.value;
          var newPwd = newPasswordInput.value;
          var confirmPwd = confirmPasswordInput.value;
          var isValid = true;

          if (!currentPwd) {
            currentPasswordError.textContent = "Current password is required";
            currentPasswordInput.classList.add("input-error");
            isValid = false;
          }

          if (!newPwd) {
            newPasswordError.textContent = "New password is required";
            newPasswordInput.classList.add("input-error");
            isValid = false;
          } else if (newPwd.length < 6) {
            newPasswordError.textContent = "Password must be at least 6 characters";
            newPasswordInput.classList.add("input-error");
            isValid = false;
          }

          if (!confirmPwd) {
            confirmPasswordError.textContent = "Please confirm your password";
            confirmPasswordInput.classList.add("input-error");
            isValid = false;
          } else if (newPwd !== confirmPwd) {
            confirmPasswordError.textContent = "Passwords do not match";
            confirmPasswordInput.classList.add("input-error");
            isValid = false;
          }

          if (!isValid) return;

          passwordSaveBtn.disabled = true;
          passwordSaveBtn.textContent = "Updating...";

          setTimeout(function() {
            closeDropdown();
            passwordSaveBtn.disabled = false;
            passwordSaveBtn.textContent = "Update Password";
            showSuccess();
          }, 500);
        });
      })();
    </script>

    <script>
      // ── Profile picture upload ──
      (function () {
        var picInput = document.getElementById("picInput");
        var camSvg =
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>';

        function updatePic(dataUrl) {
          var picEl = document.getElementById("profilePicContainer");
          picEl.innerHTML =
            '<img src="' +
            dataUrl +
            '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />' +
            '<button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">' +
            camSvg +
            "</button>";
          document
            .getElementById("changePicBtn")
            .addEventListener("click", function (ev) {
              ev.stopPropagation();
              picInput.click();
            });
        }

        function compressImage(dataUrl, maxSize, quality, callback) {
          var img = new Image();
          img.onload = function () {
            var canvas = document.createElement("canvas");
            var side = Math.min(img.width, img.height);
            canvas.width = maxSize;
            canvas.height = maxSize;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(
              img,
              (img.width - side) / 2,
              (img.height - side) / 2,
              side,
              side,
              0,
              0,
              maxSize,
              maxSize,
            );
            callback(canvas.toDataURL("image/jpeg", quality));
          };
          img.src = dataUrl;
        }

        picInput.addEventListener("change", function (e) {
          var file = e.target.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function (event) {
            updatePic(event.target.result);
            compressImage(event.target.result, 200, 0.8, function (compressed) {
              localStorage.setItem("profilePic", compressed);
              updatePic(compressed);
              window.dispatchEvent(
                new CustomEvent("profilePicChanged", { detail: compressed }),
              );
            });
          };
          reader.readAsDataURL(file);
        });
      })();
    </script>

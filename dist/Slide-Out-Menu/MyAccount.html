    <script>
      // ── Delete Account Dropdown logic ──
      (function () {
        var deleteBtn = document.getElementById("deleteAccountBtn");
        var deleteDropdown = document.getElementById("deleteAccountDropdown");
        if (!deleteBtn || !deleteDropdown) return;
        
        var deleteArrow = deleteBtn.querySelector('.account-arrow');
        var deletePasswordInput = document.getElementById("deletePasswordInput");
        var deletePasswordError = document.getElementById("deletePasswordError");
        var deleteCancelBtn = document.getElementById("deleteCancelBtn");
        var deleteConfirmBtn = document.getElementById("deleteConfirmBtn");

        function closeDropdown() {
          if (deleteDropdown) {
            deleteDropdown.classList.remove("show");
          }
          if (deleteArrow) {
            deleteArrow.classList.remove("rotated");
          }
          if (deletePasswordError) {
            deletePasswordError.textContent = "";
          }
          if (deletePasswordInput) {
            deletePasswordInput.classList.remove("input-error");
            deletePasswordInput.value = "";
          }
        }

        if (deleteBtn) {
          deleteBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (deleteDropdown.classList.contains("show")) {
              closeDropdown();
            } else {
              deleteDropdown.classList.add("show");
              if (deleteArrow) deleteArrow.classList.add("rotated");
            }
          });
        }

        if (deleteCancelBtn) {
          deleteCancelBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            closeDropdown();
          });
        }

        document.addEventListener("click", function (e) {
          if (deleteDropdown && !deleteDropdown.contains(e.target) && deleteBtn && !deleteBtn.contains(e.target)) {
            if (deleteDropdown.classList.contains("show")) {
              closeDropdown();
            }
          }
        });

        if (deleteConfirmBtn) {
          deleteConfirmBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (deletePasswordError) {
              deletePasswordError.textContent = "";
            }
            if (deletePasswordInput) {
              deletePasswordInput.classList.remove("input-error");
            }
            
            var password = deletePasswordInput ? deletePasswordInput.value : "";
            if (!password) {
              if (deletePasswordError) {
                deletePasswordError.textContent = "Password is required to delete account";
              }
              if (deletePasswordInput) {
                deletePasswordInput.classList.add("input-error");
              }
              return;
            }

            deleteConfirmBtn.disabled = true;
            deleteConfirmBtn.textContent = "Deleting...";

            // Use existing Firebase functions
            (async function() {
              try {
                var fb = window.__firebaseAuth;
                if (!fb || !fb.auth || !fb.db) {
                  alert('Firebase not initialized');
                  deleteConfirmBtn.disabled = false;
                  deleteConfirmBtn.textContent = "Delete Account";
                  return;
                }

                var user = fb.auth.currentUser;
                if (!user) {
                  alert('Please log in to delete your account');
                  deleteConfirmBtn.disabled = false;
                  deleteConfirmBtn.textContent = "Delete Account";
                  return;
                }

                var password = deletePasswordInput ? deletePasswordInput.value : "";
                
                // Reauthenticate
                var credential = fb.EmailAuthProvider.credential(user.email, password);
                await fb.reauthenticateWithCredential(user, credential);

                // Delete Firestore document
                await fb.deleteDoc(fb.doc(fb.db, 'tbUsers', user.uid));

                // Delete auth user
                await fb.deleteUser(user);

                // Clear localStorage and redirect
                localStorage.clear();
                window.location.href = '/index.html';
              } catch (err) {
                deleteConfirmBtn.disabled = false;
                deleteConfirmBtn.textContent = "Delete Account";
                if (err.code === 'auth/wrong-password') {
                  if (deletePasswordError) deletePasswordError.textContent = "Incorrect password";
                  if (deletePasswordInput) deletePasswordInput.classList.add("input-error");
                } else if (err.code === 'auth/requires-recent-login') {
                  alert('For security, please log out and log back in before deleting your account.');
                } else {
                  alert('Error deleting account: ' + err.message);
                }
              }
            })();
          });
        }
      })();
    </script>
    <script>
      // ── Edit Profile Dropdown logic ──
      (function () {
        var editBtn = document.getElementById("editProfileBtn");
        var dropdown = document.getElementById("editProfileDropdown");
        if (!editBtn || !dropdown) return;
        
        var arrow = editBtn.querySelector('.account-arrow');
        var statusInput = document.getElementById("editUsernameInput");
        var displayNameInput = document.getElementById("editDisplayNameInput");
        var statusError = document.getElementById("usernameError");
        var displayNameError = document.getElementById("displayNameError");
        var cancelBtn = document.getElementById("editCancelBtn");
        var saveBtn = document.getElementById("editSaveBtn");
        var toast = document.getElementById("successToast");
        var unsavedModal = document.getElementById("unsavedChangesModal");
        var unsavedNo = document.getElementById("unsavedNo");
        var unsavedYes = document.getElementById("unsavedYes");

        var originalStatus = "";
        var originalDisplayName = "";
        var hasUnsavedChanges = false;
        var pendingClose = false;

        function getOriginalValues() {
          var profileNameEl = document.getElementById("profileName");
          originalStatus = localStorage.getItem("userStatus") || "";
          originalDisplayName = (profileNameEl ? profileNameEl.textContent : "") || localStorage.getItem("userName") || "";
        }

        function checkForChanges() {
          var currentStatus = statusInput ? statusInput.value.trim() : "";
          var currentDisplayName = displayNameInput ? displayNameInput.value.trim() : "";
          hasUnsavedChanges = (currentStatus !== originalStatus || currentDisplayName !== originalDisplayName);
        }

        function clearErrors() {
          if (statusError) statusError.textContent = "";
          if (displayNameError) displayNameError.textContent = "";
          if (statusInput) statusInput.classList.remove("input-error");
          if (displayNameInput) displayNameInput.classList.remove("input-error");
        }

        function closeDropdown(discard) {
          if (discard || !hasUnsavedChanges) {
            if (dropdown) dropdown.classList.remove("show");
            if (arrow) arrow.classList.remove("rotated");
            clearErrors();
            hasUnsavedChanges = false;
          } else {
            if (unsavedModal) {
              pendingClose = true;
              unsavedModal.classList.add("show");
            }
          }
        }

        function openDropdown() {
          getOriginalValues();
          if (statusInput) statusInput.value = originalStatus;
          if (displayNameInput) displayNameInput.value = originalDisplayName;
          clearErrors();
          hasUnsavedChanges = false;
          if (dropdown) dropdown.classList.add("show");
          if (arrow) arrow.classList.add("rotated");
        }

        function showSuccess() {
          if (toast) {
            toast.classList.add("show");
            setTimeout(function() {
              toast.classList.remove("show");
            }, 3000);
          }
        }

        function refreshDisplay() {
          var newDisplayName = displayNameInput ? displayNameInput.value.trim() : "";
          var profileNameEl = document.getElementById("profileName");
          var profileStatusEl = document.getElementById("profileStatus");
          if (newDisplayName && profileNameEl) {
            profileNameEl.textContent = newDisplayName;
            localStorage.setItem("userName", newDisplayName);
          }
          var newStatus = statusInput ? statusInput.value.trim() : "";
          if (newStatus && profileStatusEl) {
            profileStatusEl.textContent = newStatus;
            localStorage.setItem("userStatus", newStatus);
          }
          getOriginalValues();
          hasUnsavedChanges = false;
        }

        if (editBtn) {
          editBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (dropdown && dropdown.classList.contains("show")) {
              closeDropdown(false);
            } else {
              openDropdown();
            }
          });
        }

        if (cancelBtn) {
          cancelBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            closeDropdown(false);
          });
        }

        if (statusInput) {
          statusInput.addEventListener("input", checkForChanges);
        }
        if (displayNameInput) {
          displayNameInput.addEventListener("input", checkForChanges);
        }

        document.addEventListener("click", function (e) {
          if (dropdown && !dropdown.contains(e.target) && editBtn && !editBtn.contains(e.target)) {
            if (dropdown.classList.contains("show")) {
              closeDropdown(false);
            }
          }
        });

        if (unsavedNo) {
          unsavedNo.addEventListener("click", function (e) {
            e.stopPropagation();
            if (unsavedModal) unsavedModal.classList.remove("show");
            pendingClose = false;
          });
        }

        if (unsavedYes) {
          unsavedYes.addEventListener("click", function (e) {
            e.stopPropagation();
            if (unsavedModal) unsavedModal.classList.remove("show");
            if (pendingClose) {
              if (dropdown) dropdown.classList.remove("show");
              if (arrow) arrow.classList.remove("rotated");
              clearErrors();
              hasUnsavedChanges = false;
              pendingClose = false;
            }
          });
        }

        if (unsavedModal) {
          unsavedModal.addEventListener("click", function (e) {
            if (e.target === unsavedModal) {
              unsavedModal.classList.remove("show");
              pendingClose = false;
            }
          });
        }

        if (saveBtn) {
          saveBtn.addEventListener("click", function (e) {
            console.log("Save button clicked!");
            e.stopPropagation();
            clearErrors();
            var status = statusInput ? statusInput.value.trim() : "";
            var displayName = displayNameInput ? displayNameInput.value.trim() : "";
            console.log("status:", status, "displayName:", displayName);
            var isValid = true;

            if (!status) {
              if (statusError) {
                statusError.textContent = "Status is required";
                statusError.classList.add("error-message");
              }
              if (statusInput) statusInput.classList.add("input-error");
              isValid = false;
            }

            if (!displayName) {
              if (displayNameError) {
                displayNameError.textContent = "Display name is required";
                displayNameError.classList.add("error-message");
              }
              if (displayNameInput) displayNameInput.classList.add("input-error");
              isValid = false;
            }

            console.log("isValid:", isValid);
            if (!isValid) return;

            console.log("Proceeding with save...");
            var newDisplayName = displayName;
            var newStatus = status;
            
            // Update UI immediately
            var profileNameEl = document.getElementById("profileName");
            var profileStatusEl = document.getElementById("profileStatus");
            if (profileNameEl) profileNameEl.textContent = newDisplayName;
            if (profileStatusEl) profileStatusEl.textContent = newStatus;
            localStorage.setItem("userName", newDisplayName);
            localStorage.setItem("userStatus", newStatus);
            
            // Save to Firebase - Firestore and Auth
            var fb = window.__firebaseAuth;
            console.log("fb:", fb);
            var user = fb ? fb.auth.currentUser : null;
            console.log("user:", user);
            
            if (user && fb && fb.db) {
              console.log("Saving to Firestore...");
              // Save to Firestore tbUsers collection
              fb.setDoc(fb.doc(fb.db, "tbUsers", user.uid), {
                name: newDisplayName,
                statusMessage: newStatus
              }, { merge: true }).then(function() {
                console.log("Firestore save success");
              }).catch(function(err) {
                console.error("Firestore save error:", err);
              });
              
              // Update Firebase Auth profile
              if (fb.updateProfile) {
                fb.updateProfile(user, { displayName: newDisplayName }).catch(function(err) {
                  console.error("Auth update error:", err);
                });
              }
            }
            
            // Dispatch event for real-time UI updates across the app
            window.dispatchEvent(new CustomEvent("profileUpdated", { 
              detail: { name: newDisplayName, status: newStatus } 
            }));
            
            if (dropdown) dropdown.classList.remove("show");
            if (arrow) arrow.classList.remove("rotated");
            showSuccess();
          });
        }
      })();
    </script>
    <script>
      // ── Change Password Dropdown logic ──
      (function () {
        var passwordBtn = document.getElementById("changePasswordBtn");
        var passwordDropdown = document.getElementById("changePasswordDropdown");
        if (!passwordBtn || !passwordDropdown) return;
        
        var passwordArrow = passwordBtn.querySelector('.account-arrow');
        var currentPasswordInput = document.getElementById("currentPasswordInput");
        var newPasswordInput = document.getElementById("newPasswordInput");
        var confirmPasswordInput = document.getElementById("confirmPasswordInput");
        var currentPasswordError = document.getElementById("currentPasswordError");
        var newPasswordError = document.getElementById("newPasswordError");
        var confirmPasswordError = document.getElementById("confirmPasswordError");
        var passwordCancelBtn = document.getElementById("passwordCancelBtn");
        var passwordSaveBtn = document.getElementById("passwordSaveBtn");
        var toast = document.getElementById("successToast");

        var hasUnsavedChanges = false;

        function checkForChanges() {
          hasUnsavedChanges = (currentPasswordInput && currentPasswordInput.value) || (newPasswordInput && newPasswordInput.value) || (confirmPasswordInput && confirmPasswordInput.value);
        }

        function clearErrors() {
          if (currentPasswordError) currentPasswordError.textContent = "";
          if (newPasswordError) newPasswordError.textContent = "";
          if (confirmPasswordError) confirmPasswordError.textContent = "";
          if (currentPasswordInput) currentPasswordInput.classList.remove("input-error");
          if (newPasswordInput) newPasswordInput.classList.remove("input-error");
          if (confirmPasswordInput) confirmPasswordInput.classList.remove("input-error");
        }

        function closeDropdown() {
          if (passwordDropdown) passwordDropdown.classList.remove("show");
          if (passwordArrow) passwordArrow.classList.remove("rotated");
          clearErrors();
          if (currentPasswordInput) currentPasswordInput.value = "";
          if (newPasswordInput) newPasswordInput.value = "";
          if (confirmPasswordInput) confirmPasswordInput.value = "";
          hasUnsavedChanges = false;
        }

        function showSuccess() {
          if (toast) {
            toast.classList.add("show");
            setTimeout(function() {
              toast.classList.remove("show");
            }, 3000);
          }
        }

        if (passwordBtn) {
          passwordBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (passwordDropdown.classList.contains("show")) {
              closeDropdown();
            } else {
              passwordDropdown.classList.add("show");
              if (passwordArrow) passwordArrow.classList.add("rotated");
            }
          });
        }

        if (passwordCancelBtn) {
          passwordCancelBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            closeDropdown();
          });
        }

        if (currentPasswordInput) currentPasswordInput.addEventListener("input", checkForChanges);
        if (newPasswordInput) newPasswordInput.addEventListener("input", checkForChanges);
        if (confirmPasswordInput) confirmPasswordInput.addEventListener("input", checkForChanges);

        document.addEventListener("click", function (e) {
          if (passwordDropdown && !passwordDropdown.contains(e.target) && passwordBtn && !passwordBtn.contains(e.target)) {
            if (passwordDropdown.classList.contains("show")) {
              closeDropdown();
            }
          }
        });

        if (passwordSaveBtn) {
          passwordSaveBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            clearErrors();
            var currentPwd = currentPasswordInput ? currentPasswordInput.value : "";
            var newPwd = newPasswordInput ? newPasswordInput.value : "";
            var confirmPwd = confirmPasswordInput ? confirmPasswordInput.value : "";
            var isValid = true;

            if (!currentPwd) {
              if (currentPasswordError) currentPasswordError.textContent = "Current password is required";
              if (currentPasswordInput) currentPasswordInput.classList.add("input-error");
              isValid = false;
            }

            if (!newPwd) {
              if (newPasswordError) newPasswordError.textContent = "New password is required";
              if (newPasswordInput) newPasswordInput.classList.add("input-error");
              isValid = false;
            } else if (newPwd.length < 6) {
              if (newPasswordError) newPasswordError.textContent = "Password must be at least 6 characters";
              if (newPasswordInput) newPasswordInput.classList.add("input-error");
              isValid = false;
            }

            if (!confirmPwd) {
              if (confirmPasswordError) confirmPasswordError.textContent = "Please confirm your password";
              if (confirmPasswordInput) confirmPasswordInput.classList.add("input-error");
              isValid = false;
            } else if (newPwd !== confirmPwd) {
              if (confirmPasswordError) confirmPasswordError.textContent = "Passwords do not match";
              if (confirmPasswordInput) confirmPasswordInput.classList.add("input-error");
              isValid = false;
            }

            if (!isValid) return;

            passwordSaveBtn.disabled = true;
            passwordSaveBtn.textContent = "Updating...";

            // Use Firebase to update password
            var fb = window.__firebaseAuth;
            if (fb && fb.auth && fb.db) {
              var user = fb.auth.currentUser;
              if (user && fb.EmailAuthProvider && fb.reauthenticateWithCredential && fb.updatePassword) {
                var credential = fb.EmailAuthProvider.credential(user.email, currentPwd);
                fb.reauthenticateWithCredential(user, credential).then(function() {
                  return fb.updatePassword(user, newPwd);
                }).then(function() {
                  closeDropdown();
                  passwordSaveBtn.disabled = false;
                  passwordSaveBtn.textContent = "Update Password";
                  showSuccess();
                }).catch(function(err) {
                  if (err.code === "auth/wrong-password") {
                    if (currentPasswordError) currentPasswordError.textContent = "Current password is incorrect";
                    if (currentPasswordInput) currentPasswordInput.classList.add("input-error");
                  } else {
                    alert("Error updating password: " + err.message);
                  }
                  passwordSaveBtn.disabled = false;
                  passwordSaveBtn.textContent = "Update Password";
                });
              } else {
                setTimeout(function() {
                  closeDropdown();
                  passwordSaveBtn.disabled = false;
                  passwordSaveBtn.textContent = "Update Password";
                  showSuccess();
                }, 500);
              }
            } else {
              setTimeout(function() {
                closeDropdown();
                passwordSaveBtn.disabled = false;
                passwordSaveBtn.textContent = "Update Password";
                showSuccess();
              }, 500);
            }
          });
        }
      })();
    </script>
    <script>
      // ── Change Email Dropdown logic ──
      (function () {
        var emailBtn = document.getElementById("changeEmailBtn");
        var emailDropdown = document.getElementById("changeEmailDropdown");
        if (!emailBtn || !emailDropdown) return;
        
        var emailArrow = emailBtn.querySelector('.account-arrow');
        var currentEmailPasswordInput = document.getElementById("currentEmailPasswordInput");
        var newEmailInput = document.getElementById("newEmailInput");
        var emailPasswordError = document.getElementById("emailPasswordError");
        var newEmailError = document.getElementById("newEmailError");
        var emailCancelBtn = document.getElementById("emailCancelBtn");
        var emailSaveBtn = document.getElementById("emailSaveBtn");
        var toast = document.getElementById("successToast");

        var hasUnsavedChanges = false;

        function checkForChanges() {
          hasUnsavedChanges = (currentEmailPasswordInput && currentEmailPasswordInput.value) || (newEmailInput && newEmailInput.value);
        }

        function clearErrors() {
          if (emailPasswordError) emailPasswordError.textContent = "";
          if (newEmailError) newEmailError.textContent = "";
          if (currentEmailPasswordInput) currentEmailPasswordInput.classList.remove("input-error");
          if (newEmailInput) newEmailInput.classList.remove("input-error");
        }

        function closeDropdown() {
          if (emailDropdown) emailDropdown.classList.remove("show");
          if (emailArrow) emailArrow.classList.remove("rotated");
          clearErrors();
          if (currentEmailPasswordInput) currentEmailPasswordInput.value = "";
          if (newEmailInput) newEmailInput.value = "";
          hasUnsavedChanges = false;
        }

        function showSuccess() {
          if (toast) {
            toast.classList.add("show");
            setTimeout(function() {
              toast.classList.remove("show");
            }, 3000);
          }
        }

        if (emailBtn) {
          emailBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (emailDropdown.classList.contains("show")) {
              closeDropdown();
            } else {
              emailDropdown.classList.add("show");
              if (emailArrow) emailArrow.classList.add("rotated");
            }
          });
        }

        if (emailCancelBtn) {
          emailCancelBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            closeDropdown();
          });
        }

        if (currentEmailPasswordInput) currentEmailPasswordInput.addEventListener("input", checkForChanges);
        if (newEmailInput) newEmailInput.addEventListener("input", checkForChanges);

        document.addEventListener("click", function (e) {
          if (emailDropdown && !emailDropdown.contains(e.target) && emailBtn && !emailBtn.contains(e.target)) {
            if (emailDropdown.classList.contains("show")) {
              closeDropdown();
            }
          }
        });

        if (emailSaveBtn) {
          emailSaveBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            clearErrors();
            var currentPwd = currentEmailPasswordInput ? currentEmailPasswordInput.value : "";
            var newEmail = newEmailInput ? newEmailInput.value.trim() : "";
            var isValid = true;

            if (!currentPwd) {
              if (emailPasswordError) emailPasswordError.textContent = "Password is required";
              if (currentEmailPasswordInput) currentEmailPasswordInput.classList.add("input-error");
              isValid = false;
            }

            if (!newEmail) {
              if (newEmailError) newEmailError.textContent = "New email is required";
              if (newEmailInput) newEmailInput.classList.add("input-error");
              isValid = false;
            } else if (!newEmail.includes("@")) {
              if (newEmailError) newEmailError.textContent = "Please enter a valid email";
              if (newEmailInput) newEmailInput.classList.add("input-error");
              isValid = false;
            }

            if (!isValid) return;

            emailSaveBtn.disabled = true;
            emailSaveBtn.textContent = "Sending...";

            var fb = window.__firebaseAuth;
            if (fb && fb.auth && fb.db) {
              var user = fb.auth.currentUser;
              if (user && fb.EmailAuthProvider && fb.reauthenticateWithCredential && fb.verifyBeforeUpdateEmail) {
                var credential = fb.EmailAuthProvider.credential(user.email, currentPwd);
                fb.reauthenticateWithCredential(user, credential).then(function() {
                  return fb.verifyBeforeUpdateEmail(user, newEmail);
                }).then(function() {
                  closeDropdown();
                  emailSaveBtn.disabled = false;
                  emailSaveBtn.textContent = "Update Email";
                  var verificationToast = document.getElementById("emailVerificationToast");
                  if (verificationToast) {
                    var verificationMessage = verificationToast.querySelector(".toast-message");
                    if (verificationMessage) verificationMessage.textContent = "A verification link has been sent to " + newEmail;
                    verificationToast.classList.add("show");
                    setTimeout(function() {
                      verificationToast.classList.remove("show");
                    }, 5000);
                  }
                }).catch(function(err) {
                  emailSaveBtn.disabled = false;
                  emailSaveBtn.textContent = "Update Email";
                  if (err.code === "auth/wrong-password") {
                    if (emailPasswordError) emailPasswordError.textContent = "Current password is incorrect";
                    if (currentEmailPasswordInput) currentEmailPasswordInput.classList.add("input-error");
                  } else if (err.code === "auth/email-already-in-use") {
                    if (newEmailError) newEmailError.textContent = "This email is already in use";
                    if (newEmailInput) newEmailInput.classList.add("input-error");
                  } else if (err.code === "auth/invalid-email") {
                    if (newEmailError) newEmailError.textContent = "Invalid email address";
                    if (newEmailInput) newEmailInput.classList.add("input-error");
                  } else {
                    alert("Error: " + err.message);
                  }
                });
              } else {
                closeDropdown();
                emailSaveBtn.disabled = false;
                emailSaveBtn.textContent = "Update Email";
                var verificationToast = document.getElementById("emailVerificationToast");
                if (verificationToast) {
                  var verificationMessage = verificationToast.querySelector(".toast-message");
                  if (verificationMessage) verificationMessage.textContent = "A verification link has been sent to " + newEmail;
                  verificationToast.classList.add("show");
                  setTimeout(function() {
                    verificationToast.classList.remove("show");
                  }, 5000);
                }
              }
            } else {
              closeDropdown();
              emailSaveBtn.disabled = false;
              emailSaveBtn.textContent = "Update Email";
              var verificationToast = document.getElementById("emailVerificationToast");
              if (verificationToast) {
                var verificationMessage = verificationToast.querySelector(".toast-message");
                if (verificationMessage) verificationMessage.textContent = "A verification link has been sent to " + newEmail;
                verificationToast.classList.add("show");
                setTimeout(function() {
                  verificationToast.classList.remove("show");
                }, 5000);
              }
            }
          });
        }
      })();
    </script>
    <script>
      // ── Profile picture upload ──
      (function () {
        var picInput = document.getElementById("picInput");
        var camSvg =
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 2L7.2 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.2L15 2H9zm3 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>';

        function updatePic(dataUrl) {
          var picEl = document.getElementById("profilePicContainer");
          picEl.innerHTML =
            '<img src="' +
            dataUrl +
            '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" />' +
            '<button class="profile-pic-overlay" id="changePicBtn" title="Change profile picture">' +
            camSvg +
            "</button>";
          document
            .getElementById("changePicBtn")
            .addEventListener("click", function (ev) {
              ev.stopPropagation();
              picInput.click();
            });
        }

        function compressImage(dataUrl, maxSize, quality, callback) {
          var img = new Image();
          img.onload = function () {
            var canvas = document.createElement("canvas");
            var side = Math.min(img.width, img.height);
            canvas.width = maxSize;
            canvas.height = maxSize;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(
              img,
              (img.width - side) / 2,
              (img.height - side) / 2,
              side,
              side,
              0,
              0,
              maxSize,
              maxSize,
            );
            callback(canvas.toDataURL("image/jpeg", quality));
          };
          img.src = dataUrl;
        }

        picInput.addEventListener("change", function (e) {
          var file = e.target.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function (event) {
            updatePic(event.target.result);
            compressImage(event.target.result, 200, 0.8, function (compressed) {
              localStorage.setItem("profilePic", compressed);
              updatePic(compressed);
              window.dispatchEvent(
                new CustomEvent("profilePicChanged", { detail: compressed }),
              );
            });
          };
          reader.readAsDataURL(file);
        });
      })();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Settings</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <script type="module" crossorigin src="/assets/settings-CBML1OGZ.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/preload-helper-DD1OZmLC.js">
  <link rel="modulepreload" crossorigin href="/assets/darkMode-CSVF0UhF.js">
  <link rel="stylesheet" crossorigin href="/assets/settings-CxPs3z05.css">
</head>
<body>
  <script>
    (function() {
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
      }
    })();
  </script>

  <div class="settings-header">
    <button class="settings-back" onclick="history.back()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <line x1="6" y1="6" x2="18" y2="18"/>
        <line x1="18" y1="6" x2="6" y2="18"/>
      </svg>
    </button>
    <h2 class="settings-title">Settings</h2>
  </div>

  <div class="settings-item">
    <span>🔔 Notifications</span>
    <div class="settings-toggle on" onclick="this.classList.toggle('on')"></div>
  </div>
  <div class="settings-item">
    <span>🌙 Dark Mode</span>
    <div class="settings-toggle" id="darkModeToggle"></div>
  </div>
  <div class="settings-item">
    <span>🌐 Language</span>
    <span class="settings-arrow">›</span>
  </div>
  <div class="settings-item">
    <span>🔊 Sound</span>
    <div class="settings-toggle on" onclick="this.classList.toggle('on')"></div>
  </div>
  <div class="settings-item">
    <span>📍 Location</span>
    <div class="settings-toggle" onclick="this.classList.toggle('on')"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

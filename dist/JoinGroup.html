  <body class="joinGroupBody" onload="initialize()">
    <script>if(localStorage.getItem('darkMode')==='true')document.body.classList.add('dark-mode');</script>
    <div class="wrapper">
      <header id="jgHeader">
        <h1 id="jgH1">Find your<br /><span id="spncolor">Buddy Group</span></h1>
      </header>

      <form class="card" id="joinGroupForm">
        <!-- Destination Search -->
        <!-- API key: AIzaSyC4BrEVNK9X9ZYsMJdnrwJgzRxu8loh4U8-->
        <script src="https://maps.googleapis.com/maps/api/js?v=3.exp&libraries=places&key=AIzaSyC4BrEVNK9X9ZYsMJdnrwJgzRxu8loh4U8&loading=async"></script>
        <script>
          var autocomplete;
          function initialize() {
            autocomplete = new google.maps.places.Autocomplete(
              /** @type {HTMLInputElement} */ (
                document.getElementById("destination-input")
              ),
              { types: ["geocode"] },
            );
            google.maps.event.addListener(
              autocomplete,
              "place_changed",
              function () {},
            );
          }
        </script>
        <div class="field">
          <label class="jgLabel">Where are you headed?</label>
          <input
            name="destination-input"
            type="text"
            id="destination-input"
            placeholder="address / street / location"
            required=""
          />
        </div>

        <!-- Trip Vibe Tags -->
        <div class="field">
          <label id="cbLable">Trip Vibe (pick all that apply)</label>
          <div id="tag-container"></div>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn">Search 🔍</button>
      </form>

      <!-- Results appear here after search -->
      <div id="results"></div>
    </div>

    <div class="mainPageContent">
      <div class="mainLogoSection">
        <img
          src="/images/carpool.png"
          alt="Travel Buddies"
          class="mainLogo"
          id="easterLogo"
        />
        <h1 class="mainTitle">Travel Buddies</h1>
        <p class="mainSubtitle">Where every journey becomes a shared adventure</p>
      </div>
      <script>
        (function () {
          var taps = 0;
          var timer = null;
          document.getElementById("easterLogo").addEventListener("click", function () {
            taps++;
            clearTimeout(timer);
            if (taps >= 5) {
              window.location.href = "/credits.html";
              return;
            }
            timer = setTimeout(function () { taps = 0; }, 3000);
          });
        })();
      </script>
      <div class="mainButtons">
